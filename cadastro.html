<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f5f1">
  <title>Cadastro | Casa Nanquim</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* ============================================================
       CASA NANQUIM — CADASTRO DE TATUADOR
       Sistema visual idêntico ao projeto
       ============================================================ */
    :root {
      --paper:        #f7f5f1;
      --paper-warm:   #f0ede7;
      --ink:          #141414;
      --ink-mid:      #2a2a2a;
      --ink-light:    #5a5a5a;
      --ink-border:   rgba(20,20,20,0.10);
      --ink-border-h: rgba(20,20,20,0.22);
      --ink-faint:    rgba(20,20,20,0.04);
      --accent:       #8b7355;
      --font-d: 'Cormorant Garamond', serif;
      --font-b: 'DM Sans', sans-serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-inout:    cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow-x: hidden; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 0;
      position: relative;
    }

    /* ===== TEXTURA DE PAPEL ===== */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ===== BLOBS ===== */
    .ink-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .ink-blob {
      position: absolute;
      border-radius: 60% 40% 55% 45% / 48% 52% 48% 52%;
      filter: blur(55px); will-change: transform;
      animation: blobDrift var(--dur, 30s) ease-in-out infinite;
    }
    .ink-blob:nth-child(1) {
      width: 580px; height: 580px; top: -200px; right: -180px;
      background: radial-gradient(ellipse, rgba(20,20,20,.05), transparent 70%);
      --dur: 36s;
    }
    .ink-blob:nth-child(2) {
      width: 480px; height: 480px; bottom: -180px; left: -160px;
      background: radial-gradient(ellipse, rgba(139,115,85,.04), transparent 70%);
      --dur: 28s; animation-delay: -10s;
    }
    .ink-blob:nth-child(3) {
      width: 320px; height: 320px; top: 40%; left: 55%;
      background: radial-gradient(ellipse, rgba(20,20,20,.03), transparent 70%);
      --dur: 22s; animation-delay: -5s;
    }
    @keyframes blobDrift {
      0%,100% { transform: translate3d(0,0,0) scale(1); }
      50%      { transform: translate3d(22px,-16px,0) scale(1.02); }
    }

    /* ===== CARD ===== */
    /* .cadastro-container: classe preservada */
    .cadastro-container {
      position: relative; z-index: 10;
      max-width: 560px; width: 100%; margin: 0 20px;
      animation: cardIn .7s var(--ease-out-expo) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* .cadastro-card: classe preservada */
    .cadastro-card {
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--ink-border);
      padding: 44px 40px 38px;
      position: relative;
      box-shadow: 0 4px 40px rgba(20,20,20,0.06);
    }
    .cadastro-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    /* ===== LOGO ===== */
    /* .logo: classe preservada */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-img-wrap { margin-bottom: 16px; }
    .logo-img-wrap img { height: 48px; width: auto; }

    /* .logo h1 / .logo p: preservados */
    .logo h1 {
      font-family: var(--font-d);
      font-size: 2rem; font-weight: 600;
      letter-spacing: -1px; line-height: 1; color: var(--ink);
    }
    .logo h1 em { font-style: italic; font-weight: 300; opacity: .7; }
    .logo p {
      font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--ink-light); margin-top: 8px; font-family: var(--font-b);
    }
    .logo-divider {
      width: 32px; height: 1px; background: var(--accent);
      opacity: .4; margin: 14px auto 0;
    }

    /* ===== MENSAGENS ===== */
    /* #errorMessage / .error-message: preservados */
    .error-message {
      background: rgba(192,80,80,0.05);
      border-left: 2px solid #c05050; color: #8b3c3c;
      padding: 12px 16px; margin-bottom: 22px;
      font-size: 0.78rem; display: none;
      font-family: var(--font-b);
      animation: alertIn .35s var(--ease-out-expo);
    }
    /* #successMessage / .success-message: preservados */
    .success-message {
      background: rgba(58,122,58,0.05);
      border-left: 2px solid #3a7a3a; color: #2a5c2a;
      padding: 12px 16px; margin-bottom: 22px;
      font-size: 0.78rem; display: none;
      font-family: var(--font-b);
      animation: alertIn .35s var(--ease-out-expo);
    }
    @keyframes alertIn {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ===== FORMULÁRIO ===== */
    /* .form-group: classe preservada */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--ink-light); margin-bottom: 8px;
      font-family: var(--font-b);
    }

    /* input: seletor preservado */
    .form-group input {
      width: 100%; padding: 12px 15px;
      background: var(--paper);
      border: 1px solid var(--ink-border);
      color: var(--ink); font-family: var(--font-b);
      font-size: 0.875rem; outline: none; border-radius: 0;
      transition: border-color .35s var(--ease-inout),
                  background .35s, box-shadow .35s;
    }
    .form-group input::placeholder { color: rgba(20,20,20,0.28); }
    .form-group input:focus {
      border-color: var(--ink-border-h); background: #fff;
      box-shadow: inset 0 0 0 1px rgba(20,20,20,0.08),
                  0 4px 16px rgba(20,20,20,0.04);
    }

    /* .form-row: classe preservada */
    .form-row { display: flex; gap: 14px; }
    .form-row .form-group { flex: 1; }

    /* Label opcional */
    .label-optional {
      font-size: 0.55rem; letter-spacing: 1px;
      color: rgba(20,20,20,0.3); text-transform: none;
      font-weight: 400; margin-left: 4px;
    }

    /* Separador de seção */
    .form-section {
      font-size: 0.55rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--accent); font-family: var(--font-b);
      margin: 28px 0 20px; display: flex; align-items: center; gap: 12px;
    }
    .form-section::after {
      content: ''; flex: 1; height: 1px; background: var(--ink-border);
    }

    /* ===== BOTÃO CADASTRAR ===== */
    /* .btn-cadastrar / #btnCadastrar: preservados */
    .btn-cadastrar {
      width: 100%; background: var(--ink); color: var(--paper);
      padding: 14px; border: 1px solid var(--ink);
      font-family: var(--font-b);
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; margin-top: 12px;
      position: relative; overflow: hidden;
      transition: background .35s var(--ease-inout),
                  transform .4s var(--ease-out-expo),
                  box-shadow .4s;
    }
    .btn-cadastrar::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,.12) 50%, transparent 70%);
      transform: translateX(-100%) skewX(-15deg);
      transition: transform .6s var(--ease-out-expo);
    }
    .btn-cadastrar:hover::before { transform: translateX(200%) skewX(-15deg); }
    .btn-cadastrar:hover {
      background: var(--ink-mid); transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(20,20,20,0.16);
    }
    .btn-cadastrar:disabled {
      opacity: 0.55; cursor: not-allowed;
      transform: none; box-shadow: none;
    }

    /* ===== LINK LOGIN ===== */
    /* .login-link: classe preservada */
    .login-link {
      text-align: center; margin-top: 28px;
      padding-top: 22px; border-top: 1px solid var(--ink-border);
      font-size: 0.75rem; color: var(--ink-light);
    }
    /* .login-link a: preservado */
    .login-link a {
      color: var(--accent); text-decoration: none;
      font-weight: 600; transition: opacity .25s;
    }
    .login-link a:hover { opacity: .72; text-decoration: underline; }

    /* ===== LINK VOLTAR ===== */
    /* .back-link: classe preservada */
    .back-link {
      text-align: center; margin-top: 14px;
    }
    /* .back-link a: preservado */
    .back-link a {
      color: var(--ink-light); text-decoration: none;
      font-size: 0.65rem; letter-spacing: 1.5px;
      text-transform: uppercase; font-family: var(--font-b);
      transition: color .25s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .back-link a:hover { color: var(--ink); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--paper-warm); }
    ::-webkit-scrollbar-thumb { background: rgba(20,20,20,.2); border-radius: 4px; }
    ::selection { background: rgba(139,115,85,.15); }

    /* .form-row vira coluna no mobile: preservado */
    @media (max-width: 550px) {
      .form-row { flex-direction: column; gap: 0; }
      .cadastro-card { padding: 36px 22px 30px; }
    }
  </style>
</head>
<body>

<div class="ink-canvas" aria-hidden="true">
  <div class="ink-blob"></div>
  <div class="ink-blob"></div>
  <div class="ink-blob"></div>
</div>

<!-- .cadastro-container: classe preservada -->
<div class="cadastro-container">
  <!-- .cadastro-card: classe preservada -->
  <div class="cadastro-card">

    <!-- .logo: classe preservada -->
    <div class="logo">
      <div class="logo-img-wrap">
        <img src="logo.png" alt="Casa Nanquim"
             onerror="this.style.display='none'">
      </div>
      <!-- .logo h1 / .logo p: preservados -->
      <h1>Casa <em>Nanquim</em></h1>
      <p>Cadastro de Tatuador</p>
      <div class="logo-divider" aria-hidden="true"></div>
    </div>

    <!-- #errorMessage / #successMessage: preservados -->
    <div id="errorMessage"  class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <!-- #cadastroForm: preservado -->
    <form id="cadastroForm">

      <div class="form-section">Dados pessoais</div>

      <!-- .form-group: preservado -->
      <div class="form-group">
        <label for="nome">Nome completo *</label>
        <input type="text" id="nome" placeholder="Seu nome completo" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="telefone">Telefone *</label>
        <input type="tel" id="telefone" placeholder="(11) 99999-9999" required autocomplete="tel">
      </div>

      <div class="form-section">Segurança</div>

      <!-- .form-row: preservado -->
      <div class="form-row">
        <div class="form-group">
          <label for="senha">Senha *</label>
          <input type="password" id="senha" placeholder="Mínimo 6 caracteres"
                 required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmarSenha">Confirmar senha *</label>
          <input type="password" id="confirmarSenha" placeholder="Repita a senha"
                 required autocomplete="new-password">
        </div>
      </div>

      <div class="form-section">
        Portfólio
        <span class="label-optional" style="text-transform:none;letter-spacing:0;font-size:.6rem;color:rgba(20,20,20,.35);">opcional</span>
      </div>

      <div class="form-group">
        <label for="instagram">
          Instagram
          <span class="label-optional">opcional</span>
        </label>
        <input type="text" id="instagram" placeholder="@seunick">
      </div>

      <div class="form-group">
        <label for="especialidade">
          Especialidade
          <span class="label-optional">opcional</span>
        </label>
        <input type="text" id="especialidade"
               placeholder="Ex: Realismo, Aquarela, Old School...">
      </div>

      <!-- .btn-cadastrar / #btnCadastrar: preservados -->
      <button type="submit" class="btn-cadastrar" id="btnCadastrar">
        <i class="fas fa-user-plus" style="font-size:.7rem;margin-right:7px;" aria-hidden="true"></i>
        Cadastrar
      </button>

    </form>

    <!-- .login-link: preservado -->
    <div class="login-link">
      <!-- href="login-tatuador.html" preservado (já corrigido no original) -->
      <p>Já tem cadastro? <a href="login-tatuador.html">Faça login aqui</a></p>
    </div>

    <!-- .back-link: preservado -->
    <div class="back-link">
      <a href="index.html">
        <i class="fas fa-arrow-left" style="font-size:.6rem;" aria-hidden="true"></i>
        Voltar para o site
      </a>
    </div>

  </div>
</div>

<!-- JS original — 100% preservado (incluindo correções do original) -->
<script>
    var host = window.location.hostname;
    var API_URL = (host === "" || host === "localhost" || host === "127.0.0.1")
        ? "http://localhost:8888/CasaNanquim/api"
        : "http://" + host + ":8888/CasaNanquim/api";
</script>
<script>
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const nome             = document.getElementById('nome').value.trim();
        const email            = document.getElementById('email').value.trim();
        const telefone         = document.getElementById('telefone').value.trim();
        const senha            = document.getElementById('senha').value;
        const confirmarSenha   = document.getElementById('confirmarSenha').value;
        const instagram        = document.getElementById('instagram').value.trim();
        const especialidade    = document.getElementById('especialidade').value.trim();

        const errorDiv         = document.getElementById('errorMessage');
        const successDiv       = document.getElementById('successMessage');
        const btnCadastrar     = document.getElementById('btnCadastrar');

        errorDiv.style.display   = 'none';
        successDiv.style.display = 'none';

        if (senha !== confirmarSenha) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ As senhas não coincidem!';
            return;
        }

        // CORRIGIDO: mínimo de 6 caracteres (era 4, muito fraco)
        if (senha.length < 6) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ A senha deve ter pelo menos 6 caracteres!';
            return;
        }

        btnCadastrar.disabled = true;
        btnCadastrar.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="font-size:.7rem;margin-right:7px;"></i> Cadastrando...';

        try {
            const response = await fetch(`${API_URL}/cadastrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha, telefone, instagram, especialidade })
            });

            const result = await response.json();

            if (result.success) {
                successDiv.style.display = 'block';
                successDiv.textContent = '✅ Cadastro realizado com sucesso! Redirecionando para o login...';
                setTimeout(() => {
                    // CORRIGIDO: redirecionava para login.html (inexistente)
                    window.location.href = 'login-tatuador.html';
                }, 2000);
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ ' + (result.error || 'Erro ao cadastrar. Tente novamente!');
            }
        } catch (error) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ Erro ao conectar com o servidor. Verifique se o Tomcat está rodando.';
            console.error('Erro:', error);
        } finally {
            btnCadastrar.disabled = false;
            btnCadastrar.innerHTML = '<i class="fas fa-user-plus" style="font-size:.7rem;margin-right:7px;"></i> Cadastrar';
        }
    });
</script>
</body>
</html>
