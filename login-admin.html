<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f5f1">
  <title>Admin Login | Casa Nanquim</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/login-admin.css">
</head>
<body>

<div class="ink-canvas" aria-hidden="true">
  <div class="ink-blob"></div>
  <div class="ink-blob"></div>
</div>

<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <div class="logo-img-wrap">
        <img src="logo.png" alt="Casa Nanquim" onerror="this.style.display='none'">
      </div>
      <h1>Casa <em>Nanquim</em></h1>
      <p>Área Administrativa</p>
      <div class="logo-divider" aria-hidden="true"></div>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-arrow-right" style="font-size:.7rem;margin-right:6px;" aria-hidden="true"></i>
        Entrar
      </button>
    </form>

    <div class="back-link">
      <a href="index.html">
        <i class="fas fa-arrow-left" style="font-size:.6rem;" aria-hidden="true"></i>
        Voltar para o site
      </a>
    </div>
  </div>
</div>

<script src="js/login-admin.js"></script>
</body>
</html>
