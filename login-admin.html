<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f5f1">
  <title>Admin Login | Casa Nanquim</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* ============================================================
       CASA NANQUIM — LOGIN ADMIN
       Sistema visual idêntico ao projeto
       ============================================================ */
    :root {
      --paper:        #f7f5f1;
      --paper-warm:   #f0ede7;
      --ink:          #141414;
      --ink-mid:      #2a2a2a;
      --ink-light:    #5a5a5a;
      --ink-border:   rgba(20,20,20,0.10);
      --ink-border-h: rgba(20,20,20,0.22);
      --ink-faint:    rgba(20,20,20,0.04);
      --accent:       #8b7355;
      --font-d: 'Cormorant Garamond', serif;
      --font-b: 'DM Sans', sans-serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-inout:    cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { overflow-x: hidden; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* ===== TEXTURA DE PAPEL ===== */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ===== BLOBS ===== */
    .ink-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .ink-blob {
      position: absolute;
      border-radius: 60% 40% 55% 45% / 48% 52% 48% 52%;
      filter: blur(55px); will-change: transform;
      animation: blobDrift var(--dur, 30s) ease-in-out infinite;
    }
    .ink-blob:nth-child(1) { width:520px; height:520px; top:-180px; right:-160px; background:radial-gradient(ellipse,rgba(20,20,20,.055),transparent 70%); --dur:34s; }
    .ink-blob:nth-child(2) { width:440px; height:440px; bottom:-160px; left:-140px; background:radial-gradient(ellipse,rgba(139,115,85,.04),transparent 70%); --dur:28s; animation-delay:-9s; }
    @keyframes blobDrift {
      0%,100%{ transform:translate3d(0,0,0) scale(1); }
      50%    { transform:translate3d(20px,-18px,0) scale(1.02); }
    }

    /* ===== CARD ===== */
    /* .login-container: classe preservada */
    .login-container {
      position: relative; z-index: 10;
      max-width: 440px; width: 100%; margin: 24px;
      animation: cardIn .7s var(--ease-out-expo) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* .login-card: classe preservada */
    .login-card {
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--ink-border);
      padding: 44px 40px 36px;
      position: relative;
      box-shadow: 0 4px 40px rgba(20,20,20,0.06);
    }
    /* Linha accent no topo */
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    /* ===== LOGO / HEADER ===== */
    /* .logo: classe preservada */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-img-wrap {
      margin-bottom: 16px;
    }
    .logo-img-wrap img {
      height: 48px; width: auto;
      /* logo escura, fundo claro — sem filtro */
    }
    /* .logo h1: preservado */
    .logo h1 {
      font-family: var(--font-d);
      font-size: 2rem; font-weight: 600;
      letter-spacing: -1px; line-height: 1;
      color: var(--ink);
    }
    .logo h1 em { font-style: italic; font-weight: 300; opacity: .7; }
    /* .logo p: preservado */
    .logo p {
      font-size: 0.6rem; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-light); margin-top: 8px;
      font-family: var(--font-b);
    }
    .logo-divider {
      width: 32px; height: 1px;
      background: var(--accent); opacity: .4;
      margin: 14px auto 0;
    }

    /* ===== MENSAGEM DE ERRO ===== */
    /* #errorMessage / .error-message: preservados */
    .error-message {
      background: rgba(192,80,80,0.05);
      border-left: 2px solid #c05050;
      color: #8b3c3c;
      padding: 12px 16px;
      margin-bottom: 22px;
      font-size: 0.78rem;
      display: none;
      font-family: var(--font-b);
      animation: alertIn .35s var(--ease-out-expo);
    }
    @keyframes alertIn { from{ opacity:0; transform:translateY(-6px); } to{ opacity:1; transform:translateY(0); } }

    /* ===== FORMULÁRIO ===== */
    /* .form-group: classe preservada */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--ink-light); margin-bottom: 8px;
      font-family: var(--font-b);
    }
    /* input: seletor preservado */
    .form-group input {
      width: 100%; padding: 12px 15px;
      background: var(--paper);
      border: 1px solid var(--ink-border);
      color: var(--ink); font-family: var(--font-b);
      font-size: 0.9rem; outline: none;
      border-radius: 0;
      transition: border-color .35s var(--ease-inout),
                  background .35s, box-shadow .35s;
    }
    .form-group input::placeholder { color: rgba(20,20,20,0.28); }
    .form-group input:focus {
      border-color: var(--ink-border-h);
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(20,20,20,0.08),
                  0 4px 16px rgba(20,20,20,0.04);
    }

    /* ===== BOTÃO LOGIN ===== */
    /* .btn-login: classe preservada */
    .btn-login {
      width: 100%; background: var(--ink); color: var(--paper);
      padding: 13px; border: 1px solid var(--ink);
      font-family: var(--font-b);
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; margin-top: 10px;
      position: relative; overflow: hidden;
      transition: background .35s var(--ease-inout),
                  transform .4s var(--ease-out-expo),
                  box-shadow .4s;
    }
    .btn-login::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,.12) 50%, transparent 70%);
      transform: translateX(-100%) skewX(-15deg);
      transition: transform .6s var(--ease-out-expo);
    }
    .btn-login:hover::before { transform: translateX(200%) skewX(-15deg); }
    .btn-login:hover {
      background: var(--ink-mid);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(20,20,20,0.16);
    }
    .btn-login:active { transform: translateY(0); }

    /* ===== LINK VOLTAR ===== */
    /* .back-link: classe preservada */
    .back-link {
      text-align: center; margin-top: 24px;
      padding-top: 22px;
      border-top: 1px solid var(--ink-border);
    }
    /* .back-link a: preservado */
    .back-link a {
      color: var(--ink-light); text-decoration: none;
      font-size: 0.65rem; letter-spacing: 1.5px;
      text-transform: uppercase; font-family: var(--font-b);
      transition: color .25s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .back-link a:hover { color: var(--ink); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--paper-warm); }
    ::-webkit-scrollbar-thumb { background: rgba(20,20,20,.2); border-radius: 4px; }
    ::selection { background: rgba(139,115,85,.15); }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px 28px; }
    }
  </style>
</head>
<body>

<div class="ink-canvas" aria-hidden="true">
  <div class="ink-blob"></div>
  <div class="ink-blob"></div>
</div>

<!-- .login-container: classe preservada -->
<div class="login-container">
  <!-- .login-card: classe preservada -->
  <div class="login-card">

    <!-- .logo: classe preservada -->
    <div class="logo">
      <div class="logo-img-wrap">
        <img src="logo.png" alt="Casa Nanquim"
             onerror="this.style.display='none'">
      </div>
      <!-- .logo h1 / .logo p: preservados -->
      <h1>Casa <em>Nanquim</em></h1>
      <p>Área Administrativa</p>
      <div class="logo-divider" aria-hidden="true"></div>
    </div>

    <!-- #errorMessage / .error-message: preservados -->
    <div id="errorMessage" class="error-message"></div>

    <!-- #loginForm: preservado -->
    <form id="loginForm">
      <!-- .form-group: preservado -->
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••" required autocomplete="current-password">
      </div>
      <!-- .btn-login: preservado -->
      <button type="submit" class="btn-login">
        <i class="fas fa-arrow-right" style="font-size:.7rem;margin-right:6px;" aria-hidden="true"></i>
        Entrar
      </button>
    </form>

    <!-- .back-link: preservado -->
    <div class="back-link">
      <a href="index.html">
        <i class="fas fa-arrow-left" style="font-size:.6rem;" aria-hidden="true"></i>
        Voltar para o site
      </a>
    </div>

  </div>
</div>

<script>
    // JS original — 100% preservado
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const usuario = document.getElementById('usuario').value.trim();
        const senha = document.getElementById('senha').value;
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'none';

        if (usuario === 'admin' && senha === 'admin') {
            localStorage.setItem('adminLogado', 'true');
            window.location.href = 'admin.html';
        } else {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ Usuário ou senha inválidos!';
        }
    });
</script>
</body>
</html>
